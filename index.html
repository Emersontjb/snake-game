<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>🐍 Snake Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas { display: block !important; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
const TILE_SIZE = 20;
const GRID_WIDTH = 15;
const GRID_HEIGHT = 11;

const TILES = { EMPTY: 0, GROUND: 1, WALL: 2 };

let game, scene;
let snake = [];
let direction = { x: 1, y: 0 };
let nextDirection = { x: 1, y: 0 };
let foodPos = { x: 7, y: 5 };
let score = 0;
let highScore = 0;
let gameOver = false;
let isRunning = false;
let lastMove = 0;
let grid = [];
let foodSprite = null;
let menuContainer = null;
let scoreText = null;

function init() {
    game = new Phaser.Game({
        type: Phaser.AUTO,
        parent: 'game-container',
        width: 300,
        height: 220,
        backgroundColor: '#1a1a2e',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: { create: createScene, update: updateScene }
    });
}

function createScene() {
    scene = this;
    highScore = parseInt(localStorage.getItem('snake-hs') || '0');
    
    createTextures();
    initGrid();
    renderGrid();
    createSnake();
    spawnFood();
    createUI();
    showMenu();
    
    // Keyboard input
    scene.input.keyboard.on('keydown', handleKey);
    
    // Touch/click
    scene.input.on('pointerdown', startGame);
}

function handleKey(e) {
    if (!isRunning) {
        if (e.key === 'Enter' || e.code === 'Space') startGame();
        return;
    }
    
    switch(e.key) {
        case 'ArrowLeft':
        case 'a':
        case 'A':
            if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
            break;
        case 'ArrowRight':
        case 'd':
        case 'D':
            if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
            break;
        case 'ArrowUp':
        case 'w':
        case 'W':
            if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
            break;
        case 'ArrowDown':
        case 's':
        case 'S':
            if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
            break;
    }
}

function createTextures() {
    // Floor
    var g = scene.add.graphics();
    g.fillStyle(0x252540, 1);
    g.fillRect(0, 0, 20, 20);
    g.fillStyle(0x2a2a45, 0.3);
    g.fillCircle(5, 5, 2);
    g.fillCircle(15, 15, 2);
    g.generateTexture('floor', 20, 20);
    g.destroy();
    
    // Wall
    g = scene.add.graphics();
    g.fillStyle(0x2d2d4a, 1);
    g.fillRect(1, 1, 18, 18);
    g.fillStyle(0x1d1d2a, 0.5);
    g.fillRect(1, 14, 18, 5);
    g.lineStyle(1, 0x000000, 0.3);
    g.strokeRect(1, 1, 18, 18);
    g.generateTexture('wall', 20, 20);
    g.destroy();
    
    // Snake head
    g = scene.add.graphics();
    g.fillStyle(0x3d6a4d, 1);
    g.fillCircle(10, 10, 9);
    g.fillStyle(0x4d7a5d, 0.4);
    g.fillCircle(8, 8, 4);
    g.fillStyle(0xeeeeee, 1);
    g.fillCircle(7, 8, 3);
    g.fillCircle(13, 8, 3);
    g.fillStyle(0x111111, 1);
    g.fillCircle(7, 9, 2);
    g.fillCircle(13, 9, 2);
    g.generateTexture('snake_head', 20, 20);
    g.destroy();
    
    // Snake body
    g = scene.add.graphics();
    g.fillStyle(0x2d5a3d, 1);
    g.fillCircle(10, 10, 8);
    g.fillStyle(0x4d7a5d, 0.25);
    g.fillCircle(7, 7, 2);
    g.generateTexture('snake_body', 20, 20);
    g.destroy();
    
    // Food
    g = scene.add.graphics();
    g.fillStyle(0xff3344, 1);
    g.fillCircle(10, 10, 7);
    g.fillStyle(0xff5566, 0.6);
    g.fillCircle(8, 8, 4);
    g.fillStyle(0xffffff, 0.5);
    g.fillCircle(7, 6, 2);
    g.lineStyle(1, 0x000000, 0.3);
    g.strokeCircle(10, 10, 7);
    g.generateTexture('food', 20, 20);
    g.destroy();
}

function initGrid() {
    grid = [];
    for (var y = 0; y < GRID_HEIGHT; y++) {
        grid[y] = [];
        for (var x = 0; x < GRID_WIDTH; x++) {
            if (x === 0 || x === GRID_WIDTH - 1 || y === 0 || y === GRID_HEIGHT - 1) {
                grid[y][x] = TILES.WALL;
            } else if (x % 2 === 0 && y % 2 === 0) {
                grid[y][x] = TILES.WALL;
            } else {
                grid[y][x] = TILES.GROUND;
            }
        }
    }
    // Safe zone
    grid[1][1] = grid[1][2] = grid[2][1] = TILES.GROUND;
}

function renderGrid() {
    for (var y = 0; y < GRID_HEIGHT; y++) {
        for (var x = 0; x < GRID_WIDTH; x++) {
            var px = x * TILE_SIZE + 10;
            var py = y * TILE_SIZE + 10;
            var tex = grid[y][x] === TILES.WALL ? 'wall' : 'floor';
            var tile = scene.add.image(px, py, tex);
            tile.setOrigin(0, 0);
            tile.setDepth(1);
        }
    }
}

function createSnake() {
    snake = [];
    for (var i = 2; i >= 0; i--) {
        var gx = 5 - i;
        var gy = 5;
        var px = gx * TILE_SIZE + 10;
        var py = gy * TILE_SIZE + 10;
        var tex = i === 0 ? 'snake_head' : 'snake_body';
        var sprite = scene.add.image(px, py, tex);
        sprite.setOrigin(0, 0);
        sprite.setDepth(20);
        snake.push({ gridX: gx, gridY: gy, sprite: sprite });
    }
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
}

function spawnFood() {
    var valid = false;
    while (!valid) {
        foodPos.x = Math.floor(Math.random() * (GRID_WIDTH - 2)) + 1;
        foodPos.y = Math.floor(Math.random() * (GRID_HEIGHT - 2)) + 1;
        
        valid = grid[foodPos.y][foodPos.x] === TILES.GROUND;
        for (var i = 0; i < snake.length; i++) {
            if (snake[i].gridX === foodPos.x && snake[i].gridY === foodPos.y) {
                valid = false;
                break;
            }
        }
    }
    
    if (foodSprite) foodSprite.destroy();
    var px = foodPos.x * TILE_SIZE + 10;
    var py = foodPos.y * TILE_SIZE + 10;
    foodSprite = scene.add.image(px, py, 'food');
    foodSprite.setOrigin(0, 0);
    foodSprite.setDepth(15);
}

function createUI() {
    scoreText = scene.add.text(10, 5, 'Score: 0', {
        fontSize: '12px', color: '#ffffff', fontFamily: 'system-ui'
    });
    scoreText.setDepth(50);
    
    menuContainer = scene.add.container(150, 110);
    menuContainer.setDepth(100);
    menuContainer.setVisible(true);
    
    var bg = scene.add.rectangle(0, 0, 180, 100, 0x000000, 0.85);
    bg.setOrigin(0.5);
    menuContainer.add(bg);
    
    var title = scene.add.text(0, -30, 'SNAKE', {
        fontSize: '22px', color: '#44ff88', fontFamily: 'system-ui', fontStyle: 'bold'
    });
    title.setOrigin(0.5);
    menuContainer.add(title);
    
    var sub = scene.add.text(0, 0, 'Tap or Enter to Start', {
        fontSize: '12px', color: '#aaaaaa', fontFamily: 'system-ui'
    });
    sub.setOrigin(0.5);
    menuContainer.add(sub);
    
    var high = scene.add.text(0, 25, 'High: ' + highScore, {
        fontSize: '11px', color: '#888888', fontFamily: 'system-ui'
    });
    high.setOrigin(0.5);
    menuContainer.add(high);
}

function showMenu() {
    if (menuContainer) menuContainer.setVisible(true);
}

function hideMenu() {
    if (menuContainer) menuContainer.setVisible(false);
}

function updateScene(time, delta) {
    if (gameOver || !isRunning) return;
    
    var moveInterval = Math.max(80, 150 - snake.length * 2);
    if (time > lastMove + moveInterval) {
        lastMove = time;
        moveSnake();
    }
}

function moveSnake() {
    direction = { x: nextDirection.x, y: nextDirection.y };
    
    var head = snake[0];
    var newX = head.gridX + direction.x;
    var newY = head.gridY + direction.y;
    
    // Wall collision
    if (newX < 0 || newX >= GRID_WIDTH || newY < 0 || newY >= GRID_HEIGHT) {
        endGame();
        return;
    }
    if (grid[newY][newX] === TILES.WALL) {
        endGame();
        return;
    }
    
    // Self collision
    for (var i = 1; i < snake.length; i++) {
        if (snake[i].gridX === newX && snake[i].gridY === newY) {
            endGame();
            return;
        }
    }
    
    var ate = (newX === foodPos.x && newY === foodPos.y);
    
    if (ate) {
        score += 10;
        if (scoreText) scoreText.setText('Score: ' + score);
        
        var tail = snake[snake.length - 1];
        var px = tail.gridX * TILE_SIZE + 10;
        var py = tail.gridY * TILE_SIZE + 10;
        var sprite = scene.add.image(px, py, 'snake_body');
        sprite.setOrigin(0, 0);
        sprite.setDepth(20);
        snake.push({ gridX: tail.gridX, gridY: tail.gridY, sprite: sprite });
        
        spawnFood();
    }
    
    // Move body
    for (var i = snake.length - 1; i > 0; i--) {
        snake[i].gridX = snake[i - 1].gridX;
        snake[i].gridY = snake[i - 1].gridY;
    }
    head.gridX = newX;
    head.gridY = newY;
    
    // Animate
    var duration = moveInterval * 0.7;
    for (var i = 0; i < snake.length; i++) {
        var sp = snake[i];
        var tp = { x: sp.gridX * TILE_SIZE + 10, y: sp.gridY * TILE_SIZE + 10 };
        scene.tweens.add({
            targets: sp.sprite,
            x: tp.x,
            y: tp.y,
            duration: duration,
            ease: 'Linear'
        });
    }
}

function endGame() {
    gameOver = true;
    isRunning = false;
    
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('snake-hs', highScore.toString());
    }
    
    scene.cameras.main.shake(200, 0.01);
    showMenu();
}

function startGame() {
    if (isRunning) return;
    
    score = 0;
    gameOver = false;
    isRunning = true;
    lastMove = 0;
    
    snake.forEach(function(s) { s.sprite.destroy(); });
    createSnake();
    spawnFood();
    if (scoreText) scoreText.setText('Score: 0');
    hideMenu();
}

init();
    </script>
</body>
</html>

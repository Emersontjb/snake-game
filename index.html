<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>🐍 Cobrinha 80s</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100%; height: 100%;
            position: relative;
        }
        canvas { display: block !important; }
        
        #controles {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 200;
            opacity: 0.7;
        }
        .linha {
            display: flex;
            gap: 5px;
        }
        .botao {
            width: 50px;
            height: 50px;
            background: #222;
            border: 2px solid #00ff00;
            border-radius: 8px;
            color: #00ff00;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .botao:active {
            background: #00ff00;
            color: #000;
        }
        
        #btnMusica {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: #222;
            border: 2px solid #00ff00;
            border-radius: 50%;
            color: #00ff00;
            font-size: 20px;
            z-index: 200;
            cursor: pointer;
        }
        #btnMusica:active {
            background: #00ff00;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <button id="btnMusica" onclick="toggleMusica()">🎵</button>
    
    <div id="controles">
        <div class="linha">
            <div class="botao" ontouchstart="moverCima()">▲</div>
        </div>
        <div class="linha">
            <div class="botao" ontouchstart="moverEsquerda()">◄</div>
            <div class="botao" ontouchstart="iniciarJogo()">OK</div>
            <div class="botao" ontouchstart="moverDireita()">►</div>
        </div>
        <div class="linha">
            <div class="botao" ontouchstart="moverBaixo()">▼</div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
// =====================================
// ÁUDIO RETRO 80s
// =====================================

var audioCtx = null;
var musicaTocando = false;
var musicaInterval = null;
var notaAtual = 0;

const NOTAS = {
    C3: 131, D3: 147, E3: 165, F3: 175, G3: 196, A3: 220, B3: 247,
    C4: 262, D4: 294, E4: 330, F4: 349, G4: 392, A4: 440, B4: 494,
    C5: 523, D5: 587, E5: 659, F5: 698, G5: 784, A5: 880,
    C6: 1047, D6: 1175, E6: 1319, F6: 1397
};

var MELODIA = [
    { n: 'E4', d: 200 }, { n: 'B3', d: 100 }, { n: 'C4', d: 200 }, { n: 'D4', d: 100 },
    { n: 'C4', d: 200 }, { n: 'B3', d: 100 }, { n: 'A3', d: 200 }, { n: 'A3', d: 100 },
    { n: 'C4', d: 200 }, { n: 'D4', d: 100 }, { n: 'E4', d: 200 }, { n: 'D4', d: 100 },
    { n: 'C4', d: 200 }, { n: 'B3', d: 100 }, { n: 'C4', d: 200 }, { n: 'D4', d: 100 },
    { n: 'E4', d: 200 }, { n: 'C4', d: 100 }, { n: 'A3', d: 200 }, { n: 'A3', d: 100 },
    { n: 'D4', d: 300 }, { n: 'F4', d: 100 }, { n: 'E4', d: 300 }, { n: 'C4', d: 100 },
    { n: 'D4', d: 200 }, { n: 'B3', d: 100 }, { n: 'C4', d: 300 }, { n: 'A3', d: 100 },
    { n: 'G3', d: 400 }
];

var MELODIA2 = [
    { n: 'G4', d: 150 }, { n: 'G4', d: 150 }, { n: 'C4', d: 300 },
    { n: 'G4', d: 150 }, { n: 'G4', d: 150 }, { n: 'C4', d: 300 },
    { n: 'G4', d: 200 }, { n: 'D4', d: 200 }, { n: 'G3', d: 400 },
    { n: 'A4', d: 150 }, { n: 'A4', d: 150 }, { n: 'C4', d: 300 },
    { n: 'A4', d: 150 }, { n: 'A4', d: 150 }, { n: 'C4', d: 300 },
    { n: 'G4', d: 300 }, { n: 'D4', d: 100 }, { n: 'G3', d: 400 }
];

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function tocarNota(freq, duracao, tipo) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = tipo || 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duracao / 1000);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duracao / 1000);
}

function iniciarMusica() {
    if (musicaTocando) return;
    initAudio();
    musicaTocando = true;
    notaAtual = 0;
    reproduzirMelodia();
    document.getElementById('btnMusica').textContent = '🔊';
}

function reproduzirMelodia() {
    if (!musicaTocando) return;
    var melodia = Math.random() > 0.5 ? MELODIA : MELODIA2;
    var nota = melodia[notaAtual % melodia.length];
    if (NOTAS[nota.n]) {
        tocarNota(NOTAS[nota.n], nota.d, 'square');
    }
    notaAtual++;
    musicaInterval = setTimeout(reproduzirMelodia, nota.d);
}

function pararMusica() {
    musicaTocando = false;
    if (musicaInterval) {
        clearTimeout(musicaInterval);
        musicaInterval = null;
    }
    document.getElementById('btnMusica').textContent = '🎵';
}

function toggleMusica() {
    initAudio();
    if (musicaTocando) {
        pararMusica();
    } else {
        iniciarMusica();
    }
}

function somComer() {
    if (!audioCtx) return;
    tocarNota(440, 60, 'square');
    setTimeout(function() { tocarNota(660, 60, 'square'); }, 30);
    setTimeout(function() { tocarNota(880, 80, 'square'); }, 60);
}

function somMover() {
    if (!audioCtx) return;
    tocarNota(180, 30, 'triangle');
}

function somGameOver() {
    if (!audioCtx) return;
    tocarNota(400, 200, 'sawtooth');
    setTimeout(function() { tocarNota(350, 200, 'sawtooth'); }, 200);
    setTimeout(function() { tocarNota(300, 200, 'sawtooth'); }, 400);
    setTimeout(function() { tocarNota(200, 500, 'sawtooth'); }, 600);
}

function somInicio() {
    if (!audioCtx) return;
    tocarNota(262, 80, 'square');
    setTimeout(function() { tocarNota(330, 80, 'square'); }, 80);
    setTimeout(function() { tocarNota(392, 80, 'square'); }, 160);
    setTimeout(function() { tocarNota(523, 150, 'square'); }, 240);
}

function somLevelUp() {
    if (!audioCtx) return;
    var notas = [523, 659, 784, 1047];
    notas.forEach(function(n, i) {
        setTimeout(function() { tocarNota(n, 120, 'square'); }, i * 80);
    });
}

// =====================================
// JOGO COM POLISH SÊNIOR
// =====================================

const TAMANHO = 20;
const COLUNAS = 15;
const LINHAS = 11;
const TILE = { CHAO: 0, PAREDE: 1 };

let scene;
let cobra = [];
let direcao = { x: 1, y: 0 };
let proximaDirecao = { x: 1, y: 0 };
let comidaPos = { x: 7, y: 5 };
let pontuacao = 0;
let recorde = 0;
let nivel = 1;
let fimDeJogo = false;
let jogando = false;
let grid = [];
let comidaSprite = null;
let menuContainer = null;
let nivelTexto = null;
let pontuacaoTexto = null;

// POLISH: Configurações de手感
const POLISH = {
    // Movimento
    lerpFactor: 0.2,           // Suavização do movimento
    overshoot: 0.15,           // Overshoot ao mudar direção
    squashAmount: 0.12,          // Squash & stretch
    bodyFollowDelay: 0.08,      // Delay do corpo seguindo
    
    // Feedback
    screenShakeIntensity: 0.008,
    foodBounceAmount: 0.3,
    eatScaleBoost: 1.4,
    eatParticleCount: 12
};

// Posições TARGET para lerp
let targetPositions = [];

document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

new Phaser.Game({
    type: Phaser.AUTO,
    parent: 'game-container',
    width: 300,
    height: 220,
    backgroundColor: '#1a1a2e',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: { create: criar, update: atualizar }
});

function criar() {
    scene = this;
    recorde = parseInt(localStorage.getItem('snake-recorde') || '0');
    
    criarTexturas();
    criarGrid();
    desenharGrid();
    criarCobra();
    criarComida();
    criarInterface();
    mostrarMenu();
    
    scene.input.keyboard.on('keydown', tratarTecla);
    scene.input.on('pointerdown', iniciarJogo);
}

function tratarTecla(e) {
    if (!jogando) {
        if (e.key === 'Enter' || e.code === 'Space') iniciarJogo();
        return;
    }
    
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
        if (direcao.x !== 1) proximaDirecao = { x: -1, y: 0 };
    }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
        if (direcao.x !== -1) proximaDirecao = { x: 1, y: 0 };
    }
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
        if (direcao.y !== 1) proximaDirecao = { x: 0, y: -1 };
    }
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
        if (direcao.y !== -1) proximaDirecao = { x: 0, y: 1 };
    }
}

function moverCima() { initAudio(); if (jogando && direcao.y !== 1) proximaDirecao = { x: 0, y: -1 }; }
function moverBaixo() { initAudio(); if (jogando && direcao.y !== -1) proximaDirecao = { x: 0, y: 1 }; }
function moverEsquerda() { initAudio(); if (jogando && direcao.x !== 1) proximaDirecao = { x: -1, y: 0 }; }
function moverDireita() { initAudio(); if (jogando && direcao.x !== -1) proximaDirecao = { x: 1, y: 0 }; }

function criarTexturas() {
    var g = scene.add.graphics();
    
    // Chão
    g.clear();
    g.fillStyle(0x1a1a2e, 1);
    g.fillRect(0, 0, 20, 20);
    g.lineStyle(1, 0x333366, 0.5);
    g.strokeRect(0, 0, 20, 20);
    g.generateTexture('chao', 20, 20);
    
    // Parede
    g.clear();
    g.fillStyle(0x00aa00, 1);
    g.fillRect(0, 0, 20, 20);
    g.lineStyle(2, 0x00ff00, 1);
    g.strokeRect(1, 1, 18, 18);
    g.fillStyle(0x004400, 1);
    g.fillRect(3, 3, 6, 6);
    g.fillRect(11, 11, 6, 6);
    g.generateTexture('parede', 20, 20);
    
    // Cabeça com mais detalhes
    g.clear();
    g.fillStyle(0x00ff00, 1);
    g.fillRect(2, 2, 16, 16);
    g.fillStyle(0x00cc00, 1);
    g.fillRect(4, 4, 5, 5);
    g.fillRect(11, 4, 5, 5);
    g.fillStyle(0x000000, 1);
    g.fillRect(5, 6, 3, 3);
    g.fillRect(12, 6, 3, 3);
    // Brilho
    g.fillStyle(0x88ff88, 0.6);
    g.fillRect(3, 3, 2, 2);
    g.generateTexture('cabeca', 20, 20);
    
    // Corpo
    g.clear();
    g.fillStyle(0x00dd00, 1);
    g.fillRect(3, 3, 14, 14);
    g.lineStyle(1, 0x009900, 0.5);
    g.strokeRect(3, 3, 14, 14);
    g.generateTexture('corpo', 20, 20);
    
    // Comida com bounce
    g.clear();
    g.fillStyle(0xff0000, 1);
    g.fillCircle(10, 10, 6);
    g.fillStyle(0x00ff00, 1);
    g.fillRect(9, 3, 2, 4);
    g.fillStyle(0xffffff, 1);
    g.fillCircle(8, 8, 2);
    g.generateTexture('comida', 20, 20);
    
    // Comida especial
    g.clear();
    g.fillStyle(0x4444ff, 1);
    g.fillCircle(10, 10, 6);
    g.fillStyle(0x00ffff, 1);
    g.fillRect(9, 3, 2, 4);
    g.generateTexture('comida_especial', 20, 20);
    
    // Comida rápida
    g.clear();
    g.fillStyle(0xffff00, 1);
    g.fillCircle(10, 10, 6);
    g.fillStyle(0xff8800, 1);
    g.fillRect(6, 6, 8, 2);
    g.fillRect(10, 8, 2, 6);
    g.generateTexture('comida_rapida', 20, 20);
    
    g.destroy();
}

function criarGrid() {
    grid = [];
    for (var y = 0; y < LINHAS; y++) {
        grid[y] = [];
        for (var x = 0; x < COLUNAS; x++) {
            if (x === 0 || x === COLUNAS - 1 || y === 0 || y === LINHAS - 1) {
                grid[y][x] = TILE.PAREDE;
            } else if (x % 2 === 0 && y % 2 === 0) {
                grid[y][x] = TILE.PAREDE;
            } else {
                grid[y][x] = TILE.CHAO;
            }
        }
    }
    grid[1][1] = grid[1][2] = grid[2][1] = TILE.CHAO;
}

function desenharGrid() {
    for (var y = 0; y < LINHAS; y++) {
        for (var x = 0; x < COLUNAS; x++) {
            var tex = grid[y][x] === TILE.PAREDE ? 'parede' : 'chao';
            var tile = scene.add.image(x * TAMANHO + 10, y * TAMANHO + 10, tex);
            tile.setOrigin(0, 0);
            tile.setDepth(1);
        }
    }
}

function criarCobra() {
    cobra = [];
    targetPositions = [];
    
    for (var i = 2; i >= 0; i--) {
        var gx = 5 - i;
        var gy = 5;
        var px = gx * TAMANHO + 10;
        var py = gy * TAMANHO + 10;
        var tex = i === 0 ? 'cabeca' : 'corpo';
        var sprite = scene.add.image(px, py, tex);
        sprite.setOrigin(0, 0);
        sprite.setDepth(20);
        
        cobra.push({
            x: gx,
            y: gy,
            sprite: sprite,
            currentX: px,
            currentY: py,
            targetX: px,
            targetY: py,
            scaleX: 1,
            scaleY: 1,
            rotation: 0
        });
        
        targetPositions.push({ x: px, y: py });
    }
    
    direcao = { x: 1, y: 0 };
    proximaDirecao = { x: 1, y: 0 };
}

function criarComida() {
    var valido = false;
    while (!valido) {
        comidaPos.x = Math.floor(Math.random() * (COLUNAS - 2)) + 1;
        comidaPos.y = Math.floor(Math.random() * (LINHAS - 2)) + 1;
        
        valido = grid[comidaPos.y][comidaPos.x] === TILE.CHAO;
        for (var i = 0; i < cobra.length; i++) {
            if (cobra[i].x === comidaPos.x && cobra[i].y === comidaPos.y) {
                valido = false;
                break;
            }
        }
    }
    
    if (comidaSprite) comidaSprite.destroy();
    
    var tipo = Math.random() < 0.1 ? 'comida_especial' : 
              (Math.random() < 0.5 ? 'comida_rapida' : 'comida');
    
    comidaSprite = scene.add.image(
        comidaPos.x * TAMANHO + 10,
        comidaPos.y * TAMANHO + 10,
        tipo
    );
    comidaSprite.setOrigin(0, 0);
    comidaSprite.setDepth(15);
}

function criarInterface() {
    nivelTexto = scene.add.text(230, 5, 'NIVEL: 1', {
        fontSize: '10px', color: '#00ff00', fontFamily: 'Courier New', fontStyle: 'bold'
    });
    nivelTexto.setDepth(50);
    
    pontuacaoTexto = scene.add.text(10, 5, 'PONTOS: 0', {
        fontSize: '12px', color: '#00ff00', fontFamily: 'Courier New', fontStyle: 'bold'
    });
    pontuacaoTexto.setDepth(50);
    
    menuContainer = scene.add.container(150, 110);
    menuContainer.setDepth(100);
    
    var fundo = scene.add.rectangle(0, 0, 180, 100, 0x000000, 0.9);
    fundo.setOrigin(0.5);
    menuContainer.add(fundo);
    
    var borda = scene.add.rectangle(0, 0, 180, 100);
    borda.setOrigin(0.5);
    borda.setStrokeStyle(2, 0x00ff00);
    menuContainer.add(borda);
    
    var titulo = scene.add.text(0, -35, 'COBRINHA', {
        fontSize: '24px', color: '#00ff00', fontFamily: 'Courier New', fontStyle: 'bold'
    });
    titulo.setOrigin(0.5);
    menuContainer.add(titulo);
    
    var sub = scene.add.text(0, -5, 'EDITION 1985', {
        fontSize: '10px', color: '#008800', fontFamily: 'Courier New'
    });
    sub.setOrigin(0.5);
    menuContainer.add(sub);
    
    var instrucao = scene.add.text(0, 15, 'TOQUE OU ENTER', {
        fontSize: '12px', color: '#00ff00', fontFamily: 'Courier New'
    });
    instrucao.setOrigin(0.5);
    menuContainer.add(instrucao);
    
    var alto = scene.add.text(0, 35, 'RECORDE: ' + recorde, {
        fontSize: '11px', color: '#008800', fontFamily: 'Courier New'
    });
    alto.setOrigin(0.5);
    menuContainer.add(alto);
    
    menuContainer.setVisible(true);
}

function mostrarMenu() { if (menuContainer) menuContainer.setVisible(true); }
function esconderMenu() { if (menuContainer) menuContainer.setVisible(false); }

function atualizar(tempo, delta) {
    if (fimDeJogo || !jogando) return;
    
    // POLISH: Atualização suave do movimento
    atualizarMovimentoSuave(delta);
    
    // Animação da comida
    if (comidaSprite) {
        var bounce = 1 + Math.sin(tempo / 200) * POLISH.foodBounceAmount;
        comidaSprite.setScale(bounce);
    }
    
    // POLISH: Idle micro-animação nos segmentos
    cobra.forEach(function(seg, i) {
        if (i > 0) { // Não na cabeça
            var idleScale = 1 + Math.sin(tempo / 300 + i * 0.5) * 0.03;
            seg.sprite.setScale(seg.scaleX * idleScale, seg.scaleY * idleScale);
        }
    });
}

function atualizarMovimentoSuave(delta) {
    var lerp = POLISH.lerpFactor;
    
    for (var i = 0; i < cobra.length; i++) {
        var seg = cobra[i];
        
        // LERP suave para posição
        seg.currentX += (seg.targetX - seg.currentX) * lerp;
        seg.currentY += (seg.targetY - seg.currentY) * lerp;
        
        // Aplicar posição com pequena margem para organicidade
        var offsetX = Math.sin(Date.now() / 500 + i) * 0.3;
        var offsetY = Math.cos(Date.now() / 500 + i * 0.7) * 0.3;
        
        seg.sprite.x = seg.currentX + offsetX;
        seg.sprite.y = seg.currentY + offsetY;
        
        // LERP para scale (squash & stretch)
        seg.scaleX += (1 - seg.scaleX) * 0.15;
        seg.scaleY += (1 - seg.scaleY) * 0.15;
    }
}

var ultimoMovimento = 0;

function moverCobra() {
    direcao = { x: proximaDirecao.x, y: proximaDirecao.y };
    
    var cabeca = cobra[0];
    var novoX = cabeca.x + direcao.x;
    var novoY = cabeca.y + direcao.y;
    
    // Verificar colisão
    if (novoX < 0 || novoX >= COLUNAS || novoY < 0 || novoY >= LINHAS) {
        terminarJogo();
        return;
    }
    if (grid[novoY][novoX] === TILE.PAREDE) {
        terminarJogo();
        return;
    }
    
    for (var i = 1; i < cobra.length; i++) {
        if (cobra[i].x === novoX && cobra[i].y === novoY) {
            terminarJogo();
            return;
        }
    }
    
    somMover();
    
    var comeu = (novoX === comidaPos.x && novoY === comidaPos.y);
    
    // POLISH: Antecipar movimento da cabeça com overshoot
    if (comeu) {
        pontuacao += 10;
        somComer();
        if (pontuacaoTexto) pontuacaoTexto.setText('PONTOS: ' + pontuacao);
        
        // Efeito de comer
        criarEfeitoComida(comidaPos.x, comidaPos.y);
        criarParticulasComer(comidaPos.x, comidaPos.y);
        
        // Squash na cabeça
        var head = cobra[0];
        head.scaleX = POLISH.eatScaleBoost;
        head.scaleY = 1 / POLISH.eatScaleBoost;
        head.sprite.setScale(head.scaleX, head.scaleY);
        
        // Subir nível
        if (pontuacao % 50 === 0) {
            nivel++;
            somLevelUp();
            if (nivelTexto) nivelTexto.setText('NIVEL: ' + nivel);
            criarEfeitoNivel(cabeca.x, cabeca.y);
        }
        
        // Adicionar novo segmento
        var rabo = cobra[cobra.length - 1];
        var sprite = scene.add.image(rabo.currentX, rabo.currentY, 'corpo');
        sprite.setOrigin(0, 0);
        sprite.setDepth(20);
        cobra.push({
            x: rabo.x,
            y: rabo.y,
            sprite: sprite,
            currentX: rabo.currentX,
            currentY: rabo.currentY,
            targetX: rabo.currentX,
            targetY: rabo.currentY,
            scaleX: 1,
            scaleY: 1,
            rotation: 0
        });
        targetPositions.push({ x: rabo.currentX, y: rabo.currentY });
        
        criarComida();
    }
    
    // Atualizar posições dos segmentos (seguir líder)
    for (var i = cobra.length - 1; i > 0; i--) {
        cobra[i].x = cobra[i - 1].x;
        cobra[i].y = cobra[i - 1].y;
        cobra[i].targetX = cobra[i].x * TAMANHO + 10;
        cobra[i].targetY = cobra[i].y * TAMANHO + 10;
    }
    
    // Cabeça vai para nova posição
    cabeca.x = novoX;
    cabeca.y = novoY;
    cabeca.targetX = novoX * TAMANHO + 10;
    cabeca.targetY = novoY * TAMANHO + 10;
    
    // POLISH: Stretch na direção do movimento
    if (direcao.x !== 0) {
        cabeca.scaleX = 1.1;
        cabeca.scaleY = 0.9;
    } else {
        cabeca.scaleX = 0.9;
        cabeca.scaleY = 1.1;
    }
    cabeca.sprite.setScale(cabeca.scaleX, cabeca.scaleY);
}

function criarEfeitoComida(x, y) {
    var efeito = scene.add.graphics();
    efeito.fillStyle(0xffffff, 1);
    efeito.fillCircle(x * TAMANHO + 10, y * TAMANHO + 10, 8);
    efeito.setDepth(30);
    
    scene.tweens.add({
        targets: efeito,
        alpha: 0,
        scale: 2,
        duration: 150,
        ease: 'Quad.easeOut',
        onComplete: function() { efeito.destroy(); }
    });
}

function criarParticulasComer(x, y) {
    for (var i = 0; i < POLISH.eatParticleCount; i++) {
        var part = scene.add.graphics();
        part.fillStyle(0xffff00, 1);
        part.fillRect(0, 0, 3, 3);
        part.setDepth(35);
        
        var angulo = (i / POLISH.eatParticleCount) * Math.PI * 2;
        var distancia = 20 + Math.random() * 15;
        var targetX = x * TAMANHO + 10 + Math.cos(angulo) * distancia;
        var targetY = y * TAMANHO + 10 + Math.sin(angulo) * distancia;
        
        part.x = x * TAMANHO + 10;
        part.y = y * TAMANHO + 10;
        
        scene.tweens.add({
            targets: part,
            x: targetX,
            y: targetY,
            alpha: 0,
            scale: 0.2,
            duration: 300,
            ease: 'Quad.easeOut',
            onComplete: function() { part.destroy(); }
        });
    }
}

function criarEfeitoNivel(x, y) {
    // Screen flash
    var flash = scene.add.rectangle(150, 110, 300, 220, 0xffff00, 0.3);
    flash.setDepth(100);
    
    scene.tweens.add({
        targets: flash,
        alpha: 0,
        duration: 300,
        onComplete: function() { flash.destroy(); }
    });
    
    // Partículas douradas
    for (var i = 0; i < 16; i++) {
        var part = scene.add.graphics();
        part.fillStyle(0xffff00, 1);
        part.fillRect(0, 0, 4, 4);
        part.setDepth(35);
        
        var angulo = (i / 16) * Math.PI * 2;
        var targetX = x * TAMANHO + 10 + Math.cos(angulo) * 50;
        var targetY = y * TAMANHO + 10 + Math.sin(angulo) * 50;
        
        part.x = x * TAMANHO + 10;
        part.y = y * TAMANHO + 10;
        
        scene.tweens.add({
            targets: part,
            x: targetX,
            y: targetY,
            alpha: 0,
            duration: 500,
            ease: 'Quad.easeOut',
            onComplete: function() { part.destroy(); }
        });
    }
}

function terminarJogo() {
    fimDeJogo = true;
    jogando = false;
    pararMusica();
    somGameOver();
    
    if (pontuacao > recorde) {
        recorde = pontuacao;
        localStorage.setItem('snake-recorde', recorde.toString());
    }
    
    // POLISH: Screen shake mais impactante
    scene.cameras.main.shake(400, POLISH.screenShakeIntensity * 2);
    
    mostrarMenu();
}

function iniciarJogo() {
    initAudio();
    if (jogando) return;
    
    pontuacao = 0;
    nivel = 1;
    fimDeJogo = false;
    jogando = true;
    somInicio();
    iniciarMusica();
    
    cobra.forEach(function(s) { s.sprite.destroy(); });
    criarCobra();
    criarComida();
    if (pontuacaoTexto) pontuacaoTexto.setText('PONTOS: 0');
    if (nivelTexto) nivelTexto.setText('NIVEL: 1');
    ultimoMovimento = 0;
    esconderMenu();
}

// =====================================
// GAME LOOP OTIMIZADO
// =====================================

var lastTime = 0;
var accumulator = 0;
var TICK_RATE = 100; // ms entre ticks

function gameLoop(timestamp) {
    if (!jogando) {
        requestAnimationFrame(gameLoop);
        return;
    }
    
    var deltaTime = timestamp - lastTime;
    lastTime = timestamp;
    
    accumulator += deltaTime;
    
    // Processar ticks de movimento
    while (accumulator >= TICK_RATE) {
        moverCobra();
        accumulator -= TICK_RATE;
    }
    
    requestAnimationFrame(gameLoop);
}

// Iniciar game loop
requestAnimationFrame(function(timestamp) {
    lastTime = timestamp;
    requestAnimationFrame(gameLoop);
});
    </script>

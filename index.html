<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>🐍 Cobrinha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: system-ui, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100%; height: 100%;
            position: relative;
        }
        canvas { display: block !important; }
        
        /* Controles touch */
        #controles {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 200;
            opacity: 0.7;
        }
        .linha {
            display: flex;
            gap: 5px;
        }
        .botao {
            width: 50px;
            height: 50px;
            background: #333;
            border: 2px solid #555;
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .botao:active {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- Controles mobile -->
    <div id="controles">
        <div class="linha">
            <div class="botao" ontouchstart="moverCima()">▲</div>
        </div>
        <div class="linha">
            <div class="botao" ontouchstart="moverEsquerda()">◄</div>
            <div class="botao" ontouchstart="iniciarJogo()">►</div>
            <div class="botao" ontouchstart="moverDireita()">►</div>
        </div>
        <div class="linha">
            <div class="botao" ontouchstart="moverBaixo()">▼</div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
// =====================================
// JOGO DA COBRINHA
// =====================================

const TAMANHO = 20;
const COLUNAS = 15;
const LINHAS = 11;
const TILE = { VAZIO: 0, CHAO: 1, PAREDE: 2 };

let scene;
let cobra = [];
let direcao = { x: 1, y: 0 };
let proximaDirecao = { x: 1, y: 0 };
let comidaPos = { x: 7, y: 5 };
let pontuacao = 0;
let recorde = 0;
let fimDeJogo = false;
let jogando = false;
let ultimoMovimento = 0;
let grid = [];
let comidaSprite = null;
let menuContainer = null;
let pontuacaoTexto = null;
let intervalo = 150;

// =====================================
// INICIALIZAÇÃO
// =====================================

new Phaser.Game({
    type: Phaser.AUTO,
    parent: 'game-container',
    width: 300,
    height: 220,
    backgroundColor: '#1a1a2e',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: { create: criar, update: atualizar }
});

function criar() {
    scene = this;
    recorde = parseInt(localStorage.getItem('snake-recorde') || '0');
    
    criarTexturas();
    criarGrid();
    desenharGrid();
    criarCobra();
    criarComida();
    criarInterface();
    mostrarMenu();
    
    scene.input.keyboard.on('keydown', tratarTecla);
    scene.input.on('pointerdown', iniciarJogo);
}

// =====================================
// CONTROLES
// =====================================

function tratarTecla(e) {
    if (!jogando) {
        if (e.key === 'Enter' || e.code === 'Space') iniciarJogo();
        return;
    }
    
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
        if (direcao.x !== 1) proximaDirecao = { x: -1, y: 0 };
    }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
        if (direcao.x !== -1) proximaDirecao = { x: 1, y: 0 };
    }
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
        if (direcao.y !== 1) proximaDirecao = { x: 0, y: -1 };
    }
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
        if (direcao.y !== -1) proximaDirecao = { x: 0, y: 1 };
    }
}

// Controles mobile
function moverCima() { if (jogando && direcao.y !== 1) proximaDirecao = { x: 0, y: -1 }; }
function moverBaixo() { if (jogando && direcao.y !== -1) proximaDirecao = { x: 0, y: 1 }; }
function moverEsquerda() { if (jogando && direcao.x !== 1) proximaDirecao = { x: -1, y: 0 }; }
function moverDireita() { if (jogando && direcao.x !== -1) proximaDirecao = { x: 1, y: 0 }; }

// =====================================
// TEXTURAS
// =====================================

function criarTexturas() {
    var g = scene.add.graphics();
    
    // Chão
    g.clear();
    g.fillStyle(0x252540, 1);
    g.fillRect(0, 0, 20, 20);
    g.fillStyle(0x2a2a45, 0.3);
    g.fillCircle(5, 5, 2);
    g.fillCircle(15, 15, 2);
    g.generateTexture('chao', 20, 20);
    
    // Parede
    g.clear();
    g.fillStyle(0x2d2d4a, 1);
    g.fillRect(1, 1, 18, 18);
    g.fillStyle(0x1d1d2a, 0.5);
    g.fillRect(1, 14, 18, 5);
    g.lineStyle(1, 0x000000, 0.3);
    g.strokeRect(1, 1, 18, 18);
    g.generateTexture('parede', 20, 20);
    
    // Cabeça
    g.clear();
    g.fillStyle(0x3d6a4d, 1);
    g.fillCircle(10, 10, 9);
    g.fillStyle(0x4d7a5d, 0.4);
    g.fillCircle(8, 8, 4);
    g.fillStyle(0xeeeeee, 1);
    g.fillCircle(7, 8, 3);
    g.fillCircle(13, 8, 3);
    g.fillStyle(0x111111, 1);
    g.fillCircle(7, 9, 2);
    g.fillCircle(13, 9, 2);
    g.generateTexture('cabeca', 20, 20);
    
    // Corpo
    g.clear();
    g.fillStyle(0x2d5a3d, 1);
    g.fillCircle(10, 10, 8);
    g.fillStyle(0x4d7a5d, 0.25);
    g.fillCircle(7, 7, 2);
    g.generateTexture('corpo', 20, 20);
    
    // Comida normal
    g.clear();
    g.fillStyle(0xff3344, 1);
    g.fillCircle(10, 10, 7);
    g.fillStyle(0xff5566, 0.6);
    g.fillCircle(8, 8, 4);
    g.fillStyle(0xffffff, 0.5);
    g.fillCircle(7, 6, 2);
    g.generateTexture('comida', 20, 20);
    
    // Comida especial (azul)
    g.clear();
    g.fillStyle(0x5599ff, 1);
    g.fillCircle(10, 10, 7);
    g.fillStyle(0x77aaff, 0.6);
    g.fillCircle(8, 8, 4);
    g.fillStyle(0xaaccff, 0.5);
    g.fillCircle(7, 6, 2);
    g.generateTexture('comida_especial', 20, 20);
    
    // Comida rápida (amarelo)
    g.clear();
    g.fillStyle(0xffdd44, 1);
    g.fillCircle(10, 10, 7);
    g.fillStyle(0xffee66, 0.6);
    g.fillCircle(8, 8, 4);
    g.generateTexture('comida_rapida', 20, 20);
    
    g.destroy();
}

// =====================================
// MAPA
// =====================================

function criarGrid() {
    grid = [];
    for (var y = 0; y < LINHAS; y++) {
        grid[y] = [];
        for (var x = 0; x < COLUNAS; x++) {
            if (x === 0 || x === COLUNAS - 1 || y === 0 || y === LINHAS - 1) {
                grid[y][x] = TILE.PAREDE;
            } else if (x % 2 === 0 && y % 2 === 0) {
                grid[y][x] = TILE.PAREDE;
            } else {
                grid[y][x] = TILE.CHAO;
            }
        }
    }
    grid[1][1] = grid[1][2] = grid[2][1] = TILE.CHAO;
}

function desenharGrid() {
    for (var y = 0; y < LINHAS; y++) {
        for (var x = 0; x < COLUNAS; x++) {
            var tex = grid[y][x] === TILE.PAREDE ? 'parede' : 'chao';
            var tile = scene.add.image(x * TAMANHO + 10, y * TAMANHO + 10, tex);
            tile.setOrigin(0, 0);
            tile.setDepth(1);
        }
    }
}

// =====================================
// COBRA
// =====================================

function criarCobra() {
    cobra = [];
    for (var i = 2; i >= 0; i--) {
        var px = (5 - i) * TAMANHO + 10;
        var py = 5 * TAMANHO + 10;
        var tex = i === 0 ? 'cabeca' : 'corpo';
        var sprite = scene.add.image(px, py, tex);
        sprite.setOrigin(0, 0);
        sprite.setDepth(20);
        cobra.push({ x: 5 - i, y: 5, sprite: sprite });
    }
    direcao = { x: 1, y: 0 };
    proximaDirecao = { x: 1, y: 0 };
}

function criarComida() {
    var valido = false;
    while (!valido) {
        comidaPos.x = Math.floor(Math.random() * (COLUNAS - 2)) + 1;
        comidaPos.y = Math.floor(Math.random() * (LINHAS - 2)) + 1;
        
        valido = grid[comidaPos.y][comidaPos.x] === TILE.CHAO;
        for (var i = 0; i < cobra.length; i++) {
            if (cobra[i].x === comidaPos.x && cobra[i].y === comidaPos.y) {
                valido = false;
                break;
            }
        }
    }
    
    if (comidaSprite) comidaSprite.destroy();
    
    // Escolher tipo de comida (10% especial)
    var tipo = Math.random() < 0.1 ? (Math.random() < 0.5 ? 'comida_especial' : 'comida_rapida') : 'comida';
    
    comidaSprite = scene.add.image(
        comidaPos.x * TAMANHO + 10,
        comidaPos.y * TAMANHO + 10,
        tipo
    );
    comidaSprite.setOrigin(0, 0);
    comidaSprite.setDepth(15);
}

// =====================================
// INTERFACE
// =====================================

function criarInterface() {
    pontuacaoTexto = scene.add.text(10, 5, 'Pontos: 0', {
        fontSize: '12px', color: '#ffffff', fontFamily: 'system-ui'
    });
    pontuacaoTexto.setDepth(50);
    
    menuContainer = scene.add.container(150, 110);
    menuContainer.setDepth(100);
    
    var fundo = scene.add.rectangle(0, 0, 180, 100, 0x000000, 0.85);
    fundo.setOrigin(0.5);
    menuContainer.add(fundo);
    
    var titulo = scene.add.text(0, -30, '🐍 COBRINHA', {
        fontSize: '20px', color: '#44ff88', fontFamily: 'system-ui', fontStyle: 'bold'
    });
    titulo.setOrigin(0.5);
    menuContainer.add(titulo);
    
    var instrucao = scene.add.text(0, 0, 'Toque ou Enter', {
        fontSize: '12px', color: '#aaaaaa', fontFamily: 'system-ui'
    });
    instrucao.setOrigin(0.5);
    menuContainer.add(instrucao);
    
    var alto = scene.add.text(0, 25, 'Recorde: ' + recorde, {
        fontSize: '11px', color: '#888888', fontFamily: 'system-ui'
    });
    alto.setOrigin(0.5);
    menuContainer.add(alto);
    
    menuContainer.setVisible(true);
}

function mostrarMenu() { if (menuContainer) menuContainer.setVisible(true); }
function esconderMenu() { if (menuContainer) menuContainer.setVisible(false); }

// =====================================
// JOGO
// =====================================

function atualizar(tempo) {
    if (fimDeJogo || !jogando) return;
    
    intervalo = Math.max(80, 150 - cobra.length * 2);
    if (tempo > ultimoMovimento + intervalo) {
        ultimoMovimento = tempo;
        moverCobra();
    }
    
    // Animar comida
    if (comidaSprite) {
        comidaSprite.setScale(1 + Math.sin(tempo / 200) * 0.1);
    }
}

function moverCobra() {
    direcao = { x: proximaDirecao.x, y: proximaDirecao.y };
    
    var cabeca = cobra[0];
    var novoX = cabeca.x + direcao.x;
    var novoY = cabeca.y + direcao.y;
    
    if (novoX < 0 || novoX >= COLUNAS || novoY < 0 || novoY >= LINHAS) {
        terminarJogo();
        return;
    }
    if (grid[novoY][novoX] === TILE.PAREDE) {
        terminarJogo();
        return;
    }
    
    for (var i = 1; i < cobra.length; i++) {
        if (cobra[i].x === novoX && cobra[i].y === novoY) {
            terminarJogo();
            return;
        }
    }
    
    var comeu = (novoX === comidaPos.x && novoY === comidaPos.y);
    
    if (comeu) {
        pontuacao += 10;
        if (pontuacaoTexto) pontuacaoTexto.setText('Pontos: ' + pontuacao);
        
        criarEfeitoComida(comidaPos.x, comidaPos.y);
        
        var rabo = cobra[cobra.length - 1];
        var sprite = scene.add.image(
            rabo.x * TAMANHO + 10,
            rabo.y * TAMANHO + 10,
            'corpo'
        );
        sprite.setOrigin(0, 0);
        sprite.setDepth(20);
        cobra.push({ x: rabo.x, y: rabo.y, sprite: sprite });
        
        criarComida();
    }
    
    for (var i = cobra.length - 1; i > 0; i--) {
        cobra[i].x = cobra[i - 1].x;
        cobra[i].y = cobra[i - 1].y;
    }
    cabeca.x = novoX;
    cabeca.y = novoY;
    
    var duracao = intervalo * 0.7;
    for (var i = 0; i < cobra.length; i++) {
        var sp = cobra[i];
        scene.tweens.add({
            targets: sp.sprite,
            x: sp.x * TAMANHO + 10,
            y: sp.y * TAMANHO + 10,
            duration: duracao,
            ease: 'Linear'
        });
    }
}

function criarEfeitoComida(x, y) {
    var efeito = scene.add.graphics();
    efeito.fillStyle(0xffffff, 0.8);
    efeito.fillCircle(x * TAMANHO + 10, y * TAMANHO + 10, 10);
    efeito.setDepth(30);
    
    scene.tweens.add({
        targets: efeito,
        alpha: 0,
        scale: 2,
        duration: 300,
        onComplete: function() { efeito.destroy(); }
    });
}

function terminarJogo() {
    fimDeJogo = true;
    jogando = false;
    
    if (pontuacao > recorde) {
        recorde = pontuacao;
        localStorage.setItem('snake-recorde', recorde.toString());
    }
    
    scene.cameras.main.shake(200, 0.01);
    mostrarMenu();
}

function iniciarJogo() {
    if (jogando) return;
    
    pontuacao = 0;
    fimDeJogo = false;
    jogando = true;
    ultimoMovimento = 0;
    
    cobra.forEach(function(s) { s.sprite.destroy(); });
    criarCobra();
    criarComida();
    if (pontuacaoTexto) pontuacaoTexto.setText('Pontos: 0');
    esconderMenu();
}
    </script>
</body>
</html>
